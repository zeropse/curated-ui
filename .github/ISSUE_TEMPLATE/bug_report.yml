name: 🐛 Bug Report
description: Report a bug, broken link, or issue with the website.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is. (e.g. Broken link for site X)
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: How do we replicate the issue?
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser / Environment
      description: What browser and OS are you using?
